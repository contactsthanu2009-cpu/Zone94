name: Auto Update News
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: Install Dependencies
        run: pip install feedparser google-generativeai
      
      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python app.py
      
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'P.D.T Sathsara'
          git config --global user.email 'contact.sthanu2009@gmail.com'
          git add index.html
          git commit -m "🚀 Auto-Update: News Refresh"
          git push
